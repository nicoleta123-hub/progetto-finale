<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calcola gli alberi da piantare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="fw-bold">Quanti alberi devi piantare?</h1>
            <p class="text-secondary">Calcola l'impatto delle tue emissioni CO₂ e scopri quanti alberi servono ogni anno per compensarle.</p>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="/">
                    {% for question in questionnaire %}
                        <div class="mb-4">
                            <label for="{{ question.name }}" class="form-label">{{ question.label }}</label>
                            <input type="number" step="any" min="0" class="form-control" id="{{ question.name }}" name="{{ question.name }}" placeholder="{{ question.placeholder }}" required />
                            <div class="form-text">{{ question.description }}</div>
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary">Calcola</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
